name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # The first engine (F02 character-math: abilities, ability-generation, saves/skills/AC/HP)
  # landed in Phase 2, so src/ is no longer empty - typecheck + test now run for real.
  rules:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/rules/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Fails if packages/rules/src/guide and supabase/functions/_shared/guide have drifted
      # (approved at the Phase 3b design review - docs/CHECKPOINTS/PHASE3B.md).
      - name: Check _shared/guide mirror is in sync
        run: node scripts/sync-guide-shared.mjs --check
        working-directory: ${{ github.workspace }}

  # Runs on GitHub's hosted runner, which has Docker regardless of the dev machine (which has
  # none - see docs/DECISIONS.md 2026-07-17). This is the "migrations apply cleanly from an
  # empty database" check; day-to-day schema changes go to the real project via
  # `supabase db push --include-seed` (see supabase/README.md), not this local stack.
  supabase-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local stack and apply migrations
        run: supabase db start
      - name: Reset (re-applies all migrations from scratch)
        run: supabase db reset
      - name: Stop local stack
        if: always()
        run: supabase stop
